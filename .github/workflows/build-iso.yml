name: Build ISO

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-desktop:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm archiso mkinitcpio-archiso

      - name: Build AurumOS ISO
        working-directory: ./ezarcher
        run: bash steps.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: aurumos-desktop-iso
          path: ezarcher/out/*.iso
          if-no-files-found: error
