name: Build ISO

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-desktop:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Restrict mirrorlist to fast mirrors
        run: |
          cat > /etc/pacman.d/mirrorlist << 'EOF'
          ## Fast mirrors for CI
          Server = https://mirrors.kernel.org/archlinux/$repo/os/$arch
          Server = https://ftp.osuosl.org/pub/archlinux/$repo/os/$arch
          Server = https://mirrors.mit.edu/archlinux/$repo/os/$arch
          Server = https://mirror.arizona.edu/archlinux/$repo/os/$arch
          Server = https://arch.mirror.constant.com/$repo/os/$arch
          Server = https://mirror.fcix.net/archlinux/$repo/os/$arch
          EOF

      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: pacman-${{ runner.os }}-${{ hashFiles('ezarcher/packages.x86_64', 'ezarcher/pacman.conf', 'ezarcher/mirrorlists/*') }}
          restore-keys: |
            pacman-${{ runner.os }}-

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm archiso mkinitcpio-archiso grub

      - name: Build AurumOS ISO
        working-directory: ./ezarcher
        run: bash steps.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: aurumos-desktop-iso
          path: ezarcher/out/*.iso
          if-no-files-found: error
