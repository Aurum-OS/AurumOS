name: Feature Request
description: Suggest an idea for AurumOS
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Suggest an improvement or new feature.

  - type: dropdown
    id: edition
    attributes:
      label: Edition
      options:
        - Desktop (ezarcher/)
        - Wii (wiiEmulator/)
        - Both
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What should be added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches?
