name: Package Request
description: Request a package to be added to AurumOS
labels:
  - package
body:
  - type: markdown
    attributes:
      value: |
        Request a package be included in the ISO or repository.

  - type: dropdown
    id: edition
    attributes:
      label: Edition
      options:
        - Desktop (ezarcher/)
        - Wii (wiiEmulator/)
        - Both
    validations:
      required: true

  - type: input
    id: package
    attributes:
      label: Package Name
      description: The exact package name as recognized by pacman
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why should this be included? (gaming, system tool, dependency, etc.)
    validations:
      required: true

  - type: input
    id: repo
    attributes:
      label: Repository
      description: Which repo provides it (Arch, Nyarch, Chaotic-AUR, ArchPOWER, wii-linux)?
